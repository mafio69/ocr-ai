# Egress allowlist proxy dla devcontainera ocr-ai.
#
# `app`/`nginx` siedzą na frontend-net, ktora jest `internal: true` (brak trasy do WAN).
# Ten proxy to jedyny serwis z realnym dostepem do internetu (siec egress-net).
# `app` dostaje HTTP_PROXY/HTTPS_PROXY wskazujace tutaj - narzedzia ktore honoruja te
# zmienne (curl, Guzzle, composer, npm, git po HTTPS, Claude Code CLI) przejda przez
# allowlist ponizej. Filtr jest po dstdomain (nazwa hosta z CONNECT), nie po IP - odporny
# na rotacje IP CDN-ow, bo squid resolvuje na biezaco przy kazdym polaczeniu.
#
# Zeby dopisac nowy dozwolony host: dodaj linie `acl allowlist dstdomain <host>` nizej
# i przebuduj serwis (`docker compose build egress-proxy && docker compose up -d`).

http_port 3128

# Kontener dziala jako non-root user `squid` (Dockerfile: USER squid) - /var/run
# nalezy do roota i nie jest zapisywalny, wiec PID/cache trzymamy w /tmp.
pid_filename /tmp/squid.pid

acl allowed_connect_ports port 443

# --- allowlist domen ---
# OVH AI Endpoints (sprawdz zgodnosc z OVH_AI_ENDPOINT w realnym .env - regiony bywaja rozne)
acl allowlist dstdomain oai.endpoints.kepler.ai.cloud.ovh.net

# Google Vision (opcjonalny fallback OCR)
acl allowlist dstdomain vision.googleapis.com
acl allowlist dstdomain oauth2.googleapis.com

# Perplexity MCP
acl allowlist dstdomain api.perplexity.ai

# Claude Code CLI (samo narzedzie AI dziala w tym kontenerze)
acl allowlist dstdomain api.anthropic.com

# GitHub - git (po HTTPS), gh CLI, releases (lazygit itp.)
acl allowlist dstdomain github.com
acl allowlist dstdomain api.github.com
acl allowlist dstdomain codeload.github.com
acl allowlist dstdomain objects.githubusercontent.com
acl allowlist dstdomain raw.githubusercontent.com

# Composer / Packagist
acl allowlist dstdomain packagist.org
acl allowlist dstdomain repo.packagist.org
acl allowlist dstdomain getcomposer.org

# npm registry (dopisz tylko jesli faktycznie potrzebne w runtime, nie tylko przy buildzie obrazu)
acl allowlist dstdomain registry.npmjs.org

http_access deny CONNECT !allowed_connect_ports
http_access allow CONNECT allowlist
http_access deny CONNECT
http_access allow allowlist
http_access deny all

cache deny all
access_log stdio:/var/log/squid/access.log