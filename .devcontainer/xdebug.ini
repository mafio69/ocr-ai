zend_extension=xdebug.so
xdebug.mode=develop,debug
xdebug.idekey=PHPSTORM
xdebug.start_with_request=trigger
xdebug.client_port=9003
; PhpStorm backend runs INSIDE this container (JetBrains Gateway / Dev Containers,
; see devcontainer.json customizations.jetbrains.backend), so Xdebug connects over
; loopback, not through a gateway to the host. This is deliberate: frontend-net is
; internal:true (app has no route to the host or WAN), so host.docker.internal is
; unreachable by design. If you debug from a PhpStorm running on the HOST instead
; (not via Gateway), change this back to host.docker.internal - that needs a separate,
; narrow network decision, see CLAUDE.md.
xdebug.client_host=127.0.0.1
xdebug.log=/dev/stdout
xdebug.log_level=0