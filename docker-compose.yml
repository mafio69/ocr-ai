services:
  app:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspace:cached
      - developer_home:/home/developer
    tmpfs:
      - /tmp
      - /run
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./.devcontainer/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/workspace/public:ro
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_user_password
    secrets:
      - db_user_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$(cat /run/secrets/db_user_password) psql -h 127.0.0.1 -U dev_user -d dev_db -c 'SELECT 1' >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  developer_home:
  postgres_data:

secrets:
  db_user_password:
    file: ./secrets/db_user_password.txt

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true
