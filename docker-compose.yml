services:
  app:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Wymagane przez JetBrains Gateway (remoteUser: root - patrz .devcontainer/php/devcontainer.json):
      # Gateway tworzy /.jbdevcontainer i chmod-uje pliki bind-mountowane z hosta (np. .idea,
      # wlasciciel = host UID, nie 0), co bez CAP_FOWNER/CAP_CHOWN konczy sie "Operation not
      # permitted" nawet dla roota - cap_drop:ALL zdejmuje te uprawnienia tez rootowi, nie tylko
      # zwyklym userom. Dziala TYLKO bo remoteUser=root: dla non-root procesu (developer) Docker
      # nie przenosi cap_add do efektywnego zestawu w ogole (zweryfikowane empirycznie), wiec
      # kolejnosc (root + te dwie capabilities) ma znaczenie, nie jest przypadkowa.
      - CHOWN
      - FOWNER
    environment:
      HTTP_PROXY: "http://egress-proxy:3128"
      HTTPS_PROXY: "http://egress-proxy:3128"
      http_proxy: "http://egress-proxy:3128"
      https_proxy: "http://egress-proxy:3128"
      NO_PROXY: "localhost,127.0.0.1,db,redis,nginx,app,host.docker.internal"
      no_proxy: "localhost,127.0.0.1,db,redis,nginx,app,host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspace:cached
      - developer_home:/home/developer
    tmpfs:
      - /tmp
      - /run
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      egress-proxy:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./.devcontainer/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/workspace/public:ro
    networks:
      - frontend-net
      - backend-net
      - publish-net
    restart: unless-stopped
    depends_on:
      - app

  egress-proxy:
    build:
      context: ./.devcontainer/egress-proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend-net
      - egress-net
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_user_password
    secrets:
      - db_user_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$(cat /run/secrets/db_user_password) psql -h 127.0.0.1 -U dev_user -d dev_db -c 'SELECT 1' >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  developer_home:
  postgres_data:

secrets:
  db_user_password:
    file: ./secrets/db_user_password.txt

networks:
  frontend-net:
    driver: bridge
    internal: true
  backend-net:
    driver: bridge
    internal: true
  egress-net:
    driver: bridge
  # Nie-internal wylacznie po to, by Docker mogl zpublikowac port 8082->80 na hosta
  # (internal:true na frontend-net blokuje publikowanie portow calkowicie). Uzywana
  # TYLKO przez nginx - nginx nie trzyma sekretow ani nie uruchamia agentow AI, wiec
  # posiadanie przez niego trasy do WAN nie otwiera z powrotem ryzyka, przed ktorym
  # chronimy `app` (ktory na ta siec NIE jest podpiety).
  publish-net:
    driver: bridge
