name: CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: PHP ${{ matrix.php }} - ${{ matrix.stability }}
    runs-on: ubuntu-latest
    defaults:
      run:
        # Po przebudowie repo (workspace/, patrz CLAUDE.md) composer.json/src/tests zyja
        # tylko pod workspace/, nie w korzeniu repo - bez tego kazdy krok "composer ..."
        # dostaje "Composer could not find a composer.json file".
        working-directory: workspace

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        stability: [stable]
        include:
          - php: '8.1'
            stability: lowest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          extensions: json, mbstring, fileinfo
          tools: composer:v2

      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('workspace/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install dependencies (stable)
        if: matrix.stability == 'stable'
        run: composer install --prefer-dist --no-progress

      - name: Install dependencies (lowest)
        if: matrix.stability == 'lowest'
        run: composer update --prefer-dist --no-progress --prefer-lowest

      - name: Check for secrets
        run: bash scripts/secret-guard.sh

      - name: Check for trivial assertions
        run: bash scripts/check-trivial-asserts.sh tests

      - name: Check code style
        run: composer cs-check

      - name: Security audit
        run: composer audit

      - name: Run test suite
        run: composer test

      - name: Run tests with coverage
        if: matrix.php == '8.4' && matrix.stability == 'stable'
        run: composer test-coverage

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.stability == 'stable'
        uses: codecov/codecov-action@v4
        with:
          file: ./workspace/coverage/clover.xml
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: workspace

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, mbstring, fileinfo
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run integration tests
        run: ./vendor/bin/phpunit --testsuite integration
        continue-on-error: true
